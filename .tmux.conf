set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
# vi キーバインド
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# alternate screen（vim等）でもドラッグで copy-mode に入るようにする
# mouse_any_flag: アプリがマウスを要求していれば渡す、そうでなければ copy-mode へ
bind -n MouseDrag1Pane if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"

# マウスドラッグ選択時に自動でシステムクリップボードにコピー
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# マウス操作有効
set -g mouse on

# ウィンドウ番号を1始まりにする
set -g base-index 1
set -g pane-base-index 1
